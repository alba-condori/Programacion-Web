<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Pizzeria</h1>
        <p>Inicie su pedido online</p>
    </header>

    <main>
        <!--Nos sirve para enviar datos-->
        <form>
            <section>
                <h2>Datos de Clientes</h2>

                <label for="nombre">Nombre</label>
                <!--El type nos indica lo que podemos ingresar en el input-->
                <input type="text" id="nombre" name="nombre"/>
                
                <label for="tel">Telefono</label>
                <input type="number" id="tel" name="tel"/>
                
                <label for="email">Email</label>
                <input type="email" id="email" name="email"/>
                
                <label for="dir">Direccion</label>
                <input type="text" name="dir" id="dir">

            </section>

            <section>
                <h3>Tamaño:</h3>

                <input type="radio" id="chica" name="tamaño" value="chica" />
                <label for="chica">Chica</label>

                <input type="radio" id="grande" name="tamaño" value="grande" />
                <label for="grande">Grande</label>

                <input type="radio" id="mediana" name="tamaño" value="mediana" />
                <label for="media">Mediana</label>

            </section>
            
            <section>
                <h2>Ingredientes</h2>

                <label for="jamon">Jamon</label>
                <input type="checkbox" id="jamon" name="ingredientes_jamon" value="jamon">
                
                <label for="peperoni">Peperoni</label>
                <input type="checkbox" id="peperoni" name="ingredientes_peperoni" value="peperoni">

                <label for="champiñon">Champiñon</label>
                <input type="checkbox" id="champiñon" name="ingrediente_champiñon" value="champiñon">

            </section>

            <section>
                <label for="masa">Tipo de masa</label>
                <select name="masa" id="masa">
                    <option value="delgada">Delgada</option>
                    <option value="gruesa">Gruesa</option>
                    <option value="integral">Integral</option>
                </select>
            </section>

            <section>
                <h2>Comentarios</h2>
                <textarea name="comentarios" id="comentarios" rows="4"></textarea>

            </section>

            <!--SIEMPRE que haya un formulario vamos a tener un boton type submit-->
            <button type="submit">Enviar pedido</button>
        </form>
    </main>
    
</body>
</html>
