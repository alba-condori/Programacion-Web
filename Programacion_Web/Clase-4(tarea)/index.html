<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>Document</title>
</head>
<body>
    <header class="estiloHeader">
        <img class="estiloImg" src="/Clase-4(tarea)/Imagenes/foto_encuesta.jpg" alt="venado_aesthetic">
        <section class="estiloTitulo">
            <h1> 𝄞 ┆ Encuesta Musical</h1>
            <p>Cuentame sobre tus gustos musicales ദ്ദി◝ ⩊ ◜.ᐟ</p>
        </section>
        
    </header>

    <main class="estiloMain">
        <form class="estiloForm">
            <section>
                <h2>♯ Datos</h2>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="edad">Edad:</label>
                <input type="number" id="edad" name="edad" required>
            </section>

            <section>

                <h2> ♬ ┆ Que tipos de géneros musicales escuchas?</h2>

                <input type="checkbox" id="rock" name="generos">
                <label for="rock">Rock</label>

                <input type="checkbox" id="pop" name="generos">
                <label for="pop">Pop</label>

                <input type="checkbox" id="jazz" name="generos">
                <label for="jazz">Jazz</label>

                <input type="checkbox" id="reggaeton" name="generos">
                <label for="reggaeton">Reggaetón</label>

                <input type="checkbox" id="rap" name="generos">
                <label for="rap">Rap</label>

                <input type="checkbox" id="clasica" name="generos">
                <label for="clasica">Clasica</label>

                <input type="checkbox" id="kpop" name="generos">
                <label for="kpop">K-Pop</label>

                <input type="checkbox" id="rybsoul" name="generos">
                <label for="rybsoul">R&B Soul</label>

                <input type="checkbox" id="indie" name="generos">
                <label for="indie">Indie</label>

                <input type="checkbox" id="salsa" name="generos">
                <label for="salsa">Salsa</label>

                <input type="checkbox" id="boleros" name="generos">
                <label for="boleros">Boleros</label>

                <input type="checkbox" id="otros" name="generos">
                <label for="otros">Otros..</label>

            </section>
            
            <section>

                <h2>ᥫ ๋ ࣭  Con que frecuencia escuchas música?</h2>

                <input type="radio" id="diario" name="frecuencia" required>
                <label for="diario">Todos los días</label>

                <input type="radio" id="aveces" name="frecuencia">
                <label for="aveces">A veces</label>

                <input type="radio" id="nunca" name="frecuencia">
                <label for="nunca">Casi nunca</label>

            </section>

            <section>
                <h2> ♪ ⁞ En que plataforma la escuchas?</h2>

                <select id="plataforma" name="plataforma">
                <option value="spotify">Spotify</option>
                <option value="youtube_m">YouTube Music</option>
                <option value="apple_music">Apple Music</option>
                <option value="amazon_m">Amazon Music</option>
                <option value="deezer">Deezer</option>
                <option value="tidal">Tidal</option>
                <option value="descargada">La tengo descargada</option>
                <option value="otra">Otra...</option>
                </select>
            </section>

            <section>
                <h2>Recomendame una canción y un genero ꉂ(˵˃ ᗜ ˂˵)</h2>
                <textarea name="comentarios" id="comentarios" rows="2" required></textarea>
            </section>

            <button type="submit"> Enviar encuesta -→ </button>

        </form>
    </main>

    <footer>

    </footer>
</body>
</html>
